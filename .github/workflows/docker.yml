name: Docker Build

# Builds the frontend + backend Docker images without pushing them.
# Validates Dockerfile correctness on every PR that touches container config.
#
# The `hashFiles()` function is only evaluable AFTER checkout, so the
# "skip if Dockerfile doesn't exist yet" guard lives at step level rather
# than job level. Until Phase 1.2 lands the Dockerfiles, each job emits a
# `::notice::` explaining the skip and then ends green.

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/Dockerfile'
      - 'frontend/.dockerignore'
      - 'frontend/nginx.conf'
      - 'backend/Dockerfile'
      - 'backend/.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/Dockerfile'
      - 'frontend/.dockerignore'
      - 'frontend/nginx.conf'
      - 'backend/Dockerfile'
      - 'backend/.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Notice if Dockerfile missing
        if: hashFiles('frontend/Dockerfile') == ''
        run: echo "::notice::frontend/Dockerfile not yet present (Phase 1.2); skipping build."
      - name: Set up Buildx
        if: hashFiles('frontend/Dockerfile') != ''
        uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        if: hashFiles('frontend/Dockerfile') != ''
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: perxli-frontend:ci

  backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Notice if Dockerfile missing
        if: hashFiles('backend/Dockerfile') == ''
        run: echo "::notice::backend/Dockerfile not yet present (Phase 1.2); skipping build."
      - name: Set up Buildx
        if: hashFiles('backend/Dockerfile') != ''
        uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        if: hashFiles('backend/Dockerfile') != ''
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: perxli-backend:ci
