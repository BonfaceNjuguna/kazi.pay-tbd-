# NGINX config for the frontend container (serving the Vite build).
#
# This is the in-container NGINX — the one IN FRONT of it on the VPS is
# DirectAdmin's NGINX, which terminates TLS and proxies to 127.0.0.1:<port>
# (see ADR-006 §"Reverse proxy: DirectAdmin's NGINX"). This server is HTTP
# only and listens on 80 inside the container's network namespace.

server {
    listen      80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable security headers — the outer DirectAdmin NGINX adds
    # HSTS + a few more, so we don't duplicate those. CSP intentionally
    # omitted: defining one safely needs round-trip with the Vite bundle's
    # inline scripts (HMR runtime, GIS callbacks) and belongs in a later
    # hardening pass.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "same-origin" always;

    # Long-cache hashed assets (Vite emits content-hashed filenames).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Brand assets at root (favicon, logo). Vite copies frontend/public/*
    # to the dist root, so the same caching rule applies — they're stable
    # enough that we don't pay the cost of constant revalidation.
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?|ttf)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html so React Router
    # owns the URL space. index.html itself MUST NOT be cached (otherwise
    # a deploy ships a fresh bundle but old shells keep pointing at the
    # old hashed asset names and the SPA white-screens).
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # Gzip — small win on the JS/CSS bundles. Brotli would be better but
    # the alpine nginx image doesn't ship it by default.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Don't log noisy health-probe paths if/when we add them.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
