name: CI

# Standard checks for Perxli. See docs/deployment/ci-and-security.md for what
# each job does and how to read failures.
#
# Runs on EVERY PR to main. No paths filter — branch protection marks these
# jobs as required, and a required check that's path-filtered out deadlocks
# the PR ("Expected — Waiting for status to be reported"). The ~2-3 min CI
# cost on docs-only PRs is much smaller than the cost of un-mergeable PRs.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs when a new commit lands on the same branch.
# Saves CI minutes when developers push iteratively.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No secrets needed by these jobs. Drop default repo permissions to read-only
# to minimise blast radius if a dep is compromised.
permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # pnpm version is read from the `packageManager` field in package.json
      # (single source of truth). Don't pass `version:` here — pnpm/action-setup
      # rejects the conflict.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # pnpm version is read from the `packageManager` field in package.json
      # (single source of truth). Don't pass `version:` here — pnpm/action-setup
      # rejects the conflict.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # pnpm version is read from the `packageManager` field in package.json
      # (single source of truth). Don't pass `version:` here — pnpm/action-setup
      # rejects the conflict.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # pnpm version is read from the `packageManager` field in package.json
      # (single source of truth). Don't pass `version:` here — pnpm/action-setup
      # rejects the conflict.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
