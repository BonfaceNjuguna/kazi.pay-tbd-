name: Docker Build

# Builds the frontend + backend Docker images without pushing them.
# Validates Dockerfile correctness on every PR that touches container config.
#
# Each job is guarded by `if: hashFiles('<path>/Dockerfile') != ''` so it shows
# as "skipped" (not failed) until Phase 1.2 lands the Dockerfiles. The paths
# trigger means this workflow only runs when container-related files change.

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/Dockerfile'
      - 'frontend/.dockerignore'
      - 'frontend/nginx.conf'
      - 'backend/Dockerfile'
      - 'backend/.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/Dockerfile'
      - 'frontend/.dockerignore'
      - 'frontend/nginx.conf'
      - 'backend/Dockerfile'
      - 'backend/.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip until Phase 1.2 adds the Dockerfile.
    if: hashFiles('frontend/Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: kazipay-frontend:ci

  backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('backend/Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: kazipay-backend:ci
